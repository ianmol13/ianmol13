<svg xmlns="http://www.w3.org/2000/svg" width="800" height="580" viewBox="0 0 800 580">
  <!--
  ============================================================
  HACKER SKILL BARS — skill_bars.svg
  ============================================================
  HOW TO UPDATE PERCENTAGES:
  Each skill has two things to change:
    1. The percentage TEXT  → change the number inside >XX%<
    2. The bar WIDTH        → width="XXX" (formula: percent * 7.4)
  
  FORMULA: new_width = your_percentage * 7.4
  Examples:
    50% → width="370"
    60% → width="444"
    65% → width="481"
    70% → width="518"
    75% → width="555"
    80% → width="592"
    85% → width="629"
    90% → width="666"
    95% → width="703"
   100% → width="740"
  ============================================================
  -->

  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="580" fill="#0a0e0a" rx="10"/>
  <rect width="800" height="580" fill="none" stroke="#00ff41" stroke-width="0.5" stroke-opacity="0.2" rx="10"/>

  <!-- Header -->
  <text x="30" y="38" font-family="'Share Tech Mono','Courier New',monospace" font-size="13" fill="#00ff41" fill-opacity="0.6" letter-spacing="3">// SKILL LEVELS</text>
  <line x1="30" y1="46" x2="770" y2="46" stroke="#00ff41" stroke-width="0.4" stroke-opacity="0.15"/>

  <!-- ============================================================ -->
  <!-- SKILL 1: Network Pentesting                                  -->
  <!-- To update: change 88% text AND width="651" (88 * 7.4 = 651) -->
  <!-- ============================================================ -->
  <text x="30" y="75" font-family="'Share Tech Mono','Courier New',monospace" font-size="12" fill="#00cc34">Network Pentesting</text>
  <text x="770" y="75" font-family="'Share Tech Mono','Courier New',monospace" font-size="12" fill="#00ff41" text-anchor="end" filter="url(#glow)">88%</text>
  <rect x="30" y="81" width="740" height="6" rx="3" fill="#0d1a0d"/>
  <rect x="30" y="81" width="651" height="6" rx="3" fill="#00ff41" filter="url(#glow)"/>

