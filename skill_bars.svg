<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <!--
  ============================================================
  HACKER SKILL BARS — skill_bars.svg
  ============================================================
  HOW TO UPDATE PERCENTAGES:
  Each skill has two things to change:
    1. The percentage TEXT  → change the number inside >XX%<
    2. The bar WIDTH        → width="XXX" (formula: percent * 7.4)

  FORMULA: new_width = your_percentage * 7.4
  Examples:
    50% → width="370"
    60% → width="444"
    65% → width="481"
    70% → width="518"
    75% → width="555"
    80% → width="592"
    85% → width="629"
    90% → width="666"
    95% → width="703"
   100% → width="740"
  ============================================================
  -->

  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="#0a0e0a" rx="10"/>
  <rect width="800" height="500" fill="none" stroke="#00ff41" stroke-width="0.5" stroke-opacity="0.2" rx="10"/>

  <!-- Header -->
  <text x="30" y="38" font-family="'Share Tech Mono','Courier New',monospace" font-size="13" fill="#00ff41" fill-opacity="0.6" letter-spacing="3">// SKILL LEVELS</text>
  <line x1="30" y1="46" x2="770" y2="46" stroke="#00ff41" stroke-width="0.4" stroke-opacity="0.15"/>

  <!-- SKILL 1: Network Pentesting — 88% → width="651" -->
  <text x="30" y="75" font-family="'Share Tech Mono','Courier New',monospace" font-size="12" fill="#00cc34">Network Pentesting</text>
  <text x="770" y="75" font-family="'Share Tech Mono','Courier New',monospace" font-size="12" fill="#00ff41" text-anchor="end" filter="url(#glow)">88%</text>
  <rect x="30" y="81" width="740" height="6" rx="3" fill="#0d1a0d"/>
  <rect x="30" y="81" width="651" height="6" rx="3" fill="#00ff41" filter="url(#glow)"/>

  <!-- SKILL 2: Linux — 78% → width="577" -->
  <text x="30" y="111" font-family="'Share Tech Mono','Courier New',monospace" font-size="12" fill="#00cc34">Linux</text>
  <text x="770" y="111" font-family="'Share Tech Mono','Courier New',monospace" font-size="12" fill="#00ff41" text-anchor="end" filter="url(#glow)">78%</text>
  <rect x="30" y="117" width="740" height="6" rx="3" fill="#0d1a0d"/>
  <rect x="30" y="117" width="577" height="6" rx="3" fill="#00ff41" filter="url(#glow)"/>

  <!-- SKILL 3: Reconnaissance — 72% → width="533" -->
  <text x="30" y="147" font-family="'Share Tech Mono','Courier New',monospace" font-size="12" fill="#00cc34">Reconnaissance</text>
  <text x="770" y="147" font-family="'Share Tech Mono','Courier New',monospace" font-size="12" fill="#00ff41" text-anchor="end" filter="url(#glow)">72%</text>
  <rect x="30" y="153" width="740" height="6" rx="3" fill="#0d1a0d"/>
  <rect x="30" y="153" width="533" height="6" rx="3" fill="#00ff41" filter="url(#glow)"/>

  <!-- SKILL 4: Web App Security — 70% → width="518" -->
  <text x="30" y="183" font-family="'Share Tech Mono','Courier New',monospace" font-size="12" fill="#00cc34">Web App Security</text>
  <text x="770" y="183" font-family="'Share Tech Mono','Courier New',monospace" font-size="12" fill="#00ff41" text-anchor="end" filter="url(#glow)">70%</text>
  <rect x="30" y="189" width="740" height="6" rx="3" fill="#0d1a0d"/>
  <rect x="30" y="189" width="518" height="6" rx="3" fill="#00ff41" filter="url(#glow)"/>

  <!-- SKILL 5: Nmap — 70% → width="518" -->
  <text x="30" y="219" font-family="'Share Tech Mono','Courier New',monospace" font-size="12" fill="#00cc34">Nmap</text>
  <text x="770" y="219" font-family="'Share Tech Mono','Courier New',monospace" font-size="12" fill="#00ff41" text-anchor="end" filter="url(#glow)">70%</text>
  <rect x="30" y="225" width="740" height="6" rx="3" fill="#0d1a0d"/>
  <rect x="30" y="225" width="518" height="6" rx="3" fill="#00ff41" filter="url(#glow)"/>

  <!-- SKILL 6: Penetration Testing — 68% → width="503" -->
  <text x="30" y="255" font-family="'Share Tech Mono','Courier New',monospace" font-size="12" fill="#00cc34">Penetration Testing</text>
  <text x="770" y="255" font-family="'Share Tech Mono','Courier New',monospace" font-size="12" fill="#00ff41" text-anchor="end" filter="url(#glow)">68%</text>
  <rect x="30" y="261" width="740" height="6" rx="3" fill="#0d1a0d"/>
  <rect x="30" y="261" width="503" height="6" rx="3" fill="#00ff41" filter="url(#glow)"/>

  <!-- SKILL 7: Vulnerability Assessment — 65% → width="481" -->
  <text x="30" y="291" font-family="'Share Tech Mono','Courier New',monospace" font-size="12" fill="#00cc34">Vulnerability Assessment</text>
  <text x="770" y="291" font-family="'Share Tech Mono','Courier New',monospace" font-size="12" fill="#00ff41" text-anchor="end" filter="url(#glow)">65%</text>
  <rect x="30" y="297" width="740" height="6" rx="3" fill="#0d1a0d"/>
  <rect x="30" y="297" width="481" height="6" rx="3" fill="#00ff41" filter="url(#glow)"/>

  <!-- SKILL 8: Burp Suite — 63% → width="466" -->
  <text x="30" y="327" font-family="'Share Tech Mono','Courier New',monospace" font-size="12" fill="#00cc34">Burp Suite</text>
  <text x="770" y="327" font-family="'Share Tech Mono','Courier New',monospace" font-size="12" fill="#00ff41" text-anchor="end" filter="url(#glow)">63%</text>
  <rect x="30" y="333" width="740" height="6" rx="3" fill="#0d1a0d"/>
  <rect x="30" y="333" width="466" height="6" rx="3" fill="#00ff41" filter="url(#glow)"/>

  <!-- SKILL 9: OSINT — 62% → width="459" -->
  <text x="30" y="363" font-family="'Share Tech Mono','Courier New',monospace" font-size="12" fill="#00cc34">OSINT</text>
  <text x="770" y="363" font-family="'Share Tech Mono','Courier New',monospace" font-size="12" fill="#00ff41" text-anchor="end" filter="url(#glow)">62%</text>
  <rect x="30" y="369" width="740" height="6" rx="3" fill="#0d1a0d"/>
  <rect x="30" y="369" width="459" height="6" rx="3" fill="#00ff41" filter="url(#glow)"/>

  <!-- SKILL 10: Wireshark — 60% → width="444" -->
  <text x="30" y="399" font-family="'Share Tech Mono','Courier New',monospace" font-size="12" fill="#00cc34">Wireshark</text>
  <text x="770" y="399" font-family="'Share Tech Mono','Courier New',monospace" font-size="12" fill="#00ff41" text-anchor="end" filter="url(#glow)">60%</text>
  <rect x="30" y="405" width="740" height="6" rx="3" fill="#0d1a0d"/>
  <rect x="30" y="405" width="444" height="6" rx="3" fill="#00ff41" filter="url(#glow)"/>

  <!-- SKILL 11: Threat Analysis — 55% → width="407" -->
  <text x="30" y="435" font-family="'Share Tech Mono','Courier New',monospace" font-size="12" fill="#00cc34">Threat Analysis</text>
  <text x="770" y="435" font-family="'Share Tech Mono','Courier New',monospace" font-size="12" fill="#00ff41" text-anchor="end" filter="url(#glow)">55%</text>
  <rect x="30" y="441" width="740" height="6" rx="3" fill="#0d1a0d"/>
  <rect x="30" y="441" width="407" height="6" rx="3" fill="#00ff41" filter="url(#glow)"/>

  <!-- SKILL 12: Red Teaming Basics — 50% → width="370" -->
  <text x="30" y="471" font-family="'Share Tech Mono','Courier New',monospace" font-size="12" fill="#00cc34">Red Teaming Basics</text>
  <text x="770" y="471" font-family="'Share Tech Mono','Courier New',monospace" font-size="12" fill="#00ff41" text-anchor="end" filter="url(#glow)">50%</text>
  <rect x="30" y="477" width="740" height="6" rx="3" fill="#0d1a0d"/>
  <rect x="30" y="477" width="370" height="6" rx="3" fill="#00ff41" filter="url(#glow)"/>

</svg>
